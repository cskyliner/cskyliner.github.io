# Pagefind configuration
# Docs: https://pagefind.app/docs/config-options/

# Source directory (Jekyll build output)
site: _site

# Output subdirectory for Pagefind index (relative to site)
output_subdir: pagefind

# Force Chinese language for proper segmentation/tokenization
# This enables Pagefind's built-in Chinese word segmentation (jieba-based)
force_language: zh-cn

# Exclude non-content elements from indexing
exclude_selectors:
  - "nav"
  - "footer"
  - ".navbar"
  - ".related-posts"
  - ".giscus"
  - ".disqus-comments"
  - ".post-tags"
  - ".post-meta"
  - "#toc-sidebar"
  - "d-contents"
  - "d-appendix"
  - "d-bibliography"
  - "d-byline"
  - "d-front-matter"
  - ".citation"
  - ".publications"
  - "script"
  - "style"
  - ".contact-icons"
  - ".contact-note"
